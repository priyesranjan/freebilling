# ──────────────────────────────────────────────────────────────────
#  Dukan Bill — Complete Docker Compose for Coolify
#
#  Services:
#   web     → Nginx (Flutter Web + Proxy) on port 80
#   backend → Node.js API on port 3000 (internal only)
# ──────────────────────────────────────────────────────────────────
version: '3.8'

services:

  # ── Flutter Web + Nginx (Public-facing) ──────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: dukan_bill_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Node.js Backend API (Internal only) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dukan_bill_backend
    restart: always
    expose:
      - "3000"         # Internal only — Nginx proxies to it
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-erp_bill_super_secret_key}
      TWO_FACTOR_API_KEY: ${TWO_FACTOR_API_KEY:-a4f42790-1574-11f1-bcb0-0200cd936042}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  default:
    name: dukan_bill_network
