# ──────────────────────────────────────────────────────────────────
#  Dukan Bill — Docker Compose for Coolify
#
#  NOTE: Do NOT bind port 80/443 here.
#  Coolify's Traefik proxy handles all external traffic.
#  Just expose internal ports and Coolify routes to them.
# ──────────────────────────────────────────────────────────────────
version: '3.8'

services:

  # ── Flutter Web + Nginx (Coolify routes traffic here) ────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: dukan_bill_web
    restart: always
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy   # Wait for backend to be healthy first
    healthcheck:
      # Just check if Nginx process is running — don't proxy to backend
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ 2>&1 || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Node.js Backend API (Internal only) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dukan_bill_backend
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-erp_bill_super_secret_key}
      TWO_FACTOR_API_KEY: ${TWO_FACTOR_API_KEY:-a4f42790-1574-11f1-bcb0-0200cd936042}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/health 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  default:
    name: dukan_bill_network

