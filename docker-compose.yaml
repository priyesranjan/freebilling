# ──────────────────────────────────────────────────────────────────
#  Dukan Bill — Docker Compose for Coolify
#
#  NOTE: Do NOT bind port 80/443 here.
#  Coolify's Traefik proxy handles all external traffic.
#  Just expose internal ports and Coolify routes to them.
# ──────────────────────────────────────────────────────────────────
version: '3.8'

services:

  # ── Flutter Web + Nginx (Coolify routes traffic here) ────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: dukan_bill_web
    restart: always
    expose:
      - "80"
    depends_on:
      - backend            # Start after backend (no health condition — avoids cascade failure)

  # ── Node.js Backend API (Internal only) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dukan_bill_backend
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-erp_bill_super_secret_key}
      TWO_FACTOR_API_KEY: ${TWO_FACTOR_API_KEY:-a4f42790-1574-11f1-bcb0-0200cd936042}
    healthcheck:
      # Use node (always available in node:18-slim) — wget is NOT in slim image
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>{process.exitCode=r.statusCode===200?0:1}).on('error',()=>process.exitCode=1)"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

networks:
  default:
    name: dukan_bill_network

